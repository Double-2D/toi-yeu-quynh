<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi bạn Quỳnh ❤️</title>
    <style>
        /* Nền chuyển màu động */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Khối nội dung chính (Đã thêm Flexbox để căn giữa tuyệt đối) */
        .card {
            background: rgba(255, 255, 255, 0.7);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(255, 100, 150, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            animation: popIn 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 10;
            width: 85%;
            max-width: 500px;
            min-height: 350px; /* Đảm bảo khung chữ nhật luôn đủ lớn và vuông vức */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Ép mọi thứ vào giữa theo chiều dọc */
            align-items: center;     /* Ép mọi thứ vào giữa theo chiều ngang */
            text-align: center;
        }

        /* Khung chứa câu hỏi và khung thành công */
        #question-space, #success-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .cute-gif {
            width: 160px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        /* Câu hỏi chính */
        h2 {
            color: #d10047;
            font-size: 2.2rem;
            margin: 0 0 30px 0;
            font-weight: 700;
        }

        /* Dòng chữ xuất hiện khi bấm Có */
        h1 {
            font-size: 3.5rem;
            color: #d10047;
            margin: 0;
            font-weight: 800;
            animation: beatText 1.5s infinite alternate ease-in-out;
        }

        .success-text {
            font-size: 1.5rem;
            color: #ff4d6d;
            margin-top: 15px;
            font-weight: 600;
        }

        /* Khu vực chứa nút bấm */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            height: 50px;
        }

        /* Định dạng chung cho nút */
        .btn {
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Nút Có */
        .btn-yes {
            background-color: #ff4d6d;
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            background-color: #ff1a49;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        }

        /* Nút Không */
        .btn-no {
            background-color: #adb5bd;
            color: white;
            z-index: 999; 
            position: relative; /* Mặc định là relative để đứng cạnh nút Có */
        }

        /* Keyframes hiệu ứng */
        @keyframes beatText {
            0% { transform: scale(1); text-shadow: 0 0 15px rgba(255, 77, 109, 0.4); }
            100% { transform: scale(1.08); text-shadow: 0 0 25px rgba(255, 77, 109, 0.8); }
        }
