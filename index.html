<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi bạn Quỳnh ❤️</title>
    <style>
        /* Nền chuyển màu động */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Khối nội dung chính (Đã thêm Flexbox để căn giữa tuyệt đối) */
        .card {
            background: rgba(255, 255, 255, 0.7);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(255, 100, 150, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            animation: popIn 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 10;
            width: 85%;
            max-width: 500px;
            min-height: 350px; /* Đảm bảo khung chữ nhật luôn đủ lớn và vuông vức */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Ép mọi thứ vào giữa theo chiều dọc */
            align-items: center;     /* Ép mọi thứ vào giữa theo chiều ngang */
            text-align: center;
        }

        /* Khung chứa câu hỏi và khung thành công */
        #question-space, #success-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .cute-gif {
            width: 160px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        /* Câu hỏi chính */
        h2 {
            color: #d10047;
            font-size: 2.2rem;
            margin: 0 0 30px 0;
            font-weight: 700;
        }

        /* Dòng chữ xuất hiện khi bấm Có */
        h1 {
            font-size: 3.5rem;
            color: #d10047;
            margin: 0;
            font-weight: 800;
            animation: beatText 1.5s infinite alternate ease-in-out;
        }

        .success-text {
            font-size: 1.5rem;
            color: #ff4d6d;
            margin-top: 15px;
            font-weight: 600;
        }

        /* Khu vực chứa nút bấm */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            height: 50px;
        }

        /* Định dạng chung cho nút */
        .btn {
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Nút Có */
        .btn-yes {
            background-color: #ff4d6d;
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            background-color: #ff1a49;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        }

        /* Nút Không */
        .btn-no {
            background-color: #adb5bd;
            color: white;
            z-index: 999; 
            position: relative; /* Mặc định là relative để đứng cạnh nút Có */
        }

        /* Keyframes hiệu ứng */
        @keyframes beatText {
            0% { transform: scale(1); text-shadow: 0 0 15px rgba(255, 77, 109, 0.4); }
            100% { transform: scale(1.08); text-shadow: 0 0 25px rgba(255, 77, 109, 0.8); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Icon bay ngẫu nhiên */
        .floating-icon {
            position: absolute;
            bottom: -10vh;
            animation: floatUp linear infinite;
            opacity: 0.8;
            z-index: 1;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="question-space">
            <img src="https://media.tenor.com/tHqgIqGk3m8AAAAi/milk-and-mocha-bear-couple.gif" alt="Cute Bear" class="cute-gif">
            
            <h2>Quỳnh có yêu bạn không?</h2>
            
            <div class="btn-container">
                <button class="btn btn-yes" onclick="answerYes()">Có</button>
                <button class="btn btn-no" id="btn-no" onmouseover="teleportNo()" onclick="teleportNo()">Không</button>
            </div>
        </div>

        <div id="success-space" style="display: none;">
            <img src="https://media.tenor.com/Z8sk7W_96YMAAAAi/milk-and-mocha-hug.gif" alt="Happy Bear" class="cute-gif">
            <h1>Love Quỳnh 3000</h1>
            <div class="success-text">Bạn cũng yêu Quỳnh nhiều lắmmmmm</div>
        </div>
    </div>

    <script>
        function teleportNo() {
            const btnNo = document.getElementById('btn-no');
            
            // Chuyển sang fixed để bắt đầu dịch chuyển tự do
            btnNo.style.position = 'fixed';
            
            // Lấy kích thước thực tế của nút (Chiều rộng và Chiều cao)
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;
            
            // Tính toán vùng bay an toàn: 
            // Kích thước màn hình trừ đi kích thước nút và trừ thêm 30px lề an toàn để nút không bao giờ chạm mép
            const maxX = window.innerWidth - btnWidth - 30;
            const maxY = window.innerHeight - btnHeight - 30;
            
            // Tính toán tọa độ X, Y ngẫu nhiên (Luôn lớn hơn 30px để không dính sát lề trái/trên)
            const randomX = Math.max(30, Math.random() * maxX);
            const randomY = Math.max(30, Math.random() * maxY);
            
            // Áp dụng tọa độ mới cho nút
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        function answerYes() {
            document.getElementById('question-space').style.display = 'none';
            document.getElementById('success-space').style.display = 'flex';
            document.getElementById('btn-no').style.display = 'none';
        }

        // Script tạo mưa trái tim
        function createFloatingIcon() {
            const icon = document.createElement('div');
            icon.classList.add('floating-icon');
            const shapes = ['❤️', '💖', '💕', '✨', '🌸', '🎀'];
            icon.innerText = shapes[Math.floor(Math.random() * shapes.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.fontSize = Math.random() * 20 + 15 + 'px';
            icon.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(icon);
            setTimeout(() => { icon.remove(); }, 7000);
        }
        setInterval(createFloatingIcon, 300);
    </script>

</body>
</html>
