<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi bạn Quỳnh ❤️</title>
    <style>
        /* Nền chuyển màu động */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffafbd);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Khối nội dung chính căn giữa tâm tuyệt đối */
        .card {
            background: rgba(255, 255, 255, 0.7);
            padding: 0 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(255, 100, 150, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            animation: popIn 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 10;
            width: 85%;
            max-width: 550px;
            height: 350px; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
        }

        /* Khung chứa câu hỏi và khung thành công */
        #question-space, #success-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Câu hỏi chính */
        h2 {
            color: #d10047;
            font-size: 2.2rem;
            margin: 0 0 40px 0;
            font-weight: 700;
        }

        /* Dòng chữ xuất hiện khi bấm Có */
        h1 {
            font-size: 3.5rem;
            color: #d10047;
            margin: 0;
            font-weight: 800;
            animation: beatText 1.5s infinite alternate ease-in-out;
        }

        .success-text {
            font-size: 1.5rem;
            color: #ff4d6d;
            margin-top: 15px;
            font-weight: 600;
        }

        /* Khu vực chứa nút bấm */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        /* Định dạng chung cho nút */
        .btn {
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Nút Có */
        .btn-yes {
            background-color: #ff4d6d;
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            background-color: #ff1a49;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        }

        /* Nút Không */
        .btn-no {
            background-color: #adb5bd;
            color: white;
            z-index: 9999; /* Tăng Z-index để chắc chắn nút luôn nổi lên trên cùng */
            position: relative;
        }

        /* Keyframes hiệu ứng */
        @keyframes beatText {
            0% { transform: scale(1); text-shadow: 0 0 15px rgba(255, 77, 109, 0.4); }
            100% { transform: scale(1.08); text-shadow: 0 0 25px rgba(255, 77, 109, 0.8); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Icon bay ngẫu nhiên */
        .floating-icon {
            position: absolute;
            bottom: -10vh;
            animation: floatUp linear infinite;
            opacity: 0.8;
            z-index: 1;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="question-space">
            <h2>Quỳnh có yêu bạn không?</h2>
            <div class="btn-container">
                <button class="btn btn-yes" onclick="answerYes()">Có</button>
                <button class="btn btn-no" id="btn-no" onmouseover="teleportNo()" onclick="teleportNo()">Không</button>
            </div>
        </div>

        <div id="success-space" style="display: none;">
            <h1>Bạn cũng yêu Quỳnh nhiều lắmmmmm</h1>
            <div class="success-text">Love Quỳnh 3000</div>
        </div>
    </div>

    <script>
        function teleportNo() {
            const btnNo = document.getElementById('btn-no');
            
            // Chuyển sang fixed để bứt nút ra khỏi khung và bay tự do
            btnNo.style.position = 'fixed';
            
            // Lấy kích thước thực tế của nút
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;
            
            // Lấy kích thước thực tế của màn hình (trình duyệt)
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // KHU VỰC AN TOÀN (Safe Zone): Cách các mép màn hình ít nhất 20px
            const safePadding = 20;
            
            // Tính toán khoảng tọa độ tối đa có thể bay tới (không bị lố)
            const maxX = windowWidth - btnWidth - safePadding;
            const maxY = windowHeight - btnHeight - safePadding;
            
            // Công thức bốc ngẫu nhiên tọa độ (Bắt buộc rơi vào khoảng từ safePadding đến maxX/maxY)
            const randomX = Math.floor(Math.random() * (maxX - safePadding + 1)) + safePadding;
            const randomY = Math.floor(Math.random() * (maxY - safePadding + 1)) + safePadding;
            
            // Áp dụng tọa độ mới
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        function answerYes() {
            document.getElementById('question-space').style.display = 'none';
            document.getElementById('success-space').style.display = 'flex';
            document.getElementById('btn-no').style.display = 'none';
        }

        // Script tạo mưa trái tim
        function createFloatingIcon() {
            const icon = document.createElement('div');
            icon.classList.add('floating-icon');
            const shapes = ['❤️', '💖', '💕', '✨', '🌸', '🎀'];
            icon.innerText = shapes[Math.floor(Math.random() * shapes.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.fontSize = Math.random() * 20 + 15 + 'px';
            icon.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(icon);
            setTimeout(() => { icon.remove(); }, 7000);
        }
        setInterval(createFloatingIcon, 300);
    </script>

</body>
</html>
