<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người anh yêu ❤️</title>
    <style>
        /* Cấu hình nền và căn giữa toàn bộ trang web */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Khối chứa nội dung */
        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(255, 77, 109, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 2s ease-in-out;
        }

        /* Hiệu ứng trái tim đập */
        .heart {
            font-size: 80px;
            color: #ff4d6d;
            display: inline-block;
            animation: beat 1.2s infinite alternate ease-in-out;
            user-select: none;
        }

        /* Định dạng dòng chữ "anh yêu em" */
        h1 {
            font-size: 3.5rem;
            color: #ff4d6d;
            margin-top: 20px;
            margin-bottom: 0;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* Định nghĩa các hiệu ứng chuyển động (Animation) */
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.18); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>anh yêu em</h1>
    </div>

</body>
</html>
